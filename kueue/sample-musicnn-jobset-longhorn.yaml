apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: sample-jobset
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: user-queue
spec:
  replicatedJobs:
  - name: main
    replicas: 1
    template:
      metadata:
        labels:
          kueue.x-k8s.io/queue-name: user-queue
      spec:
        parallelism: 1
        completions: 1
        suspend: true
        template:
          metadata:
            annotations:
              linkerd.io/inject: "disabled"   # Disable Linkerd injection
          spec:
            containers:
            - name: musicnn-job
              image: intamixx/musicnn_v3:latest
              args:
                - "python3"
                - "-m"
                - "musicnn.tagger"
                - "/musicnn/audio/TRWJAZW128F42760DD_test.mp3"
                - "--model"
                - "MSD_musicnn"
                - "--topN"
                - "3"
                - "--length"
                - "3"
                - "--overlap"
                - "1"
                - "--print"
                - "--save"
                - "/mnt/out.tags"
              securityContext:
                runAsUser: 1000
              resources:
                requests:
                  cpu: 1
                  memory: "200Mi"
              volumeMounts:
              - name: nfs
                mountPath: /mnt
            volumes:
            - name: nfs
              persistentVolumeClaim:
                claimName: pvc-rwx
            restartPolicy: Never
        backoffLimit: 1
